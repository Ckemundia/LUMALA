<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lumala Logistics - Banner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="banner-page">
    <header class="banner-header">
      <div class="banner-logo-group">
        <div class="banner-logo-circle">LL</div>
        <div>
          <h1 class="banner-title">Lumala Logistics</h1>
          <p class="banner-subtitle">Smart, Secure &amp; On Time</p>
        </div>
      </div>
      <div class="banner-marquee-wrapper">
        <marquee behavior="scroll" direction="left" scrollamount="7">
          Same–day deliveries within the city • Discounted international
          shipping • 24/7 shipment tracking • Promotional artwork designed with
          Adobe Photoshop for sharp, clear adverts • Partnered carriers across
          Africa, Europe and Asia
        </marquee>
      </div>
    </header>
  </body>
</html>
